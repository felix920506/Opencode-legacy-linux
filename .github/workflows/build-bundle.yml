name: Build opencode CentOS 7 bundle

# Replicates the local packaging process:
#   1. build  -> assemble the self-contained bundle inside an Alpine container
#   2. test   -> prove it runs inside a real CentOS 7 container
#   3. release-> (tag pushes only) attach the tarball to a GitHub Release
#
# The containerized work runs via `docker run` from the ubuntu-latest host
# rather than as a job-level `container:`. CentOS 7 (glibc 2.17) and Alpine
# (musl) cannot run the Node20-based JS actions (checkout/upload-artifact), so
# keeping those on the host is required.

on:
  push:
    tags:
      - "v*"
  # pull_request:
  #   paths:
  #     - "scripts/**"
  #     - ".github/workflows/build-bundle.yml"
  workflow_dispatch:
    inputs:
      opencode_version:
        description: "opencode release tag to package, or 'latest'"
        required: false
        default: "latest"

env:
  ALPINE_IMAGE: "alpine:3.19"
  CENTOS_IMAGE: "centos:7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve opencode version
        id: ver
        run: |
          v="${{ github.event.inputs.opencode_version }}"
          if [ -z "$v" ]; then
            case "${{ github.ref }}" in
              refs/tags/*) v="${{ github.ref_name }}" ;;
              *)           v="latest" ;;
            esac
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Packaging opencode $v"

      - name: Build bundle in Alpine
        run: |
          docker run --rm \
            -e OPENCODE_VERSION="${{ steps.ver.outputs.version }}" \
            -e OUT_DIR=/work/dist \
            -v "$PWD:/work" -w /work \
            "$ALPINE_IMAGE" \
            sh /work/scripts/build-bundle.sh

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-centos7-bundle
          path: dist/*.tar.gz
          if-no-files-found: error

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: opencode-centos7-bundle
          path: dist

      - name: Test bundle in CentOS 7
        run: |
          docker run --rm \
            -e OUT_DIR=/work/dist \
            -v "$PWD:/work" -w /work \
            "$CENTOS_IMAGE" \
            sh /work/scripts/test-bundle.sh

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: opencode-centos7-bundle
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
